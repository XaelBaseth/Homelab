---
- name: Create the media-stack directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ media_owner }}"
    group: "{{ media_group }}"
    mode: "0755"
  loop:
    - "{{ media_stack_dir }}"
    - "{{ media_stack_appdata }}"
    - "{{ media_stack_appdata }}/gluetun"
    - "{{ media_stack_appdata }}/qbittorrent"
    - "{{ media_stack_appdata }}/prowlarr"
    - "{{ media_stack_appdata }}/sonarr"
    - "{{ media_stack_appdata }}/radarr"
    - "{{ media_stack_appdata }}/bazarr"
    - "{{ media_stack_appdata }}/jellyfin"
    - "{{ media_stack_appdata }}/jellyseerr"
    - "{{ media_stack_appdata }}/maintainerr"
    - "{{ media_stack_appdata }}/npm"

- name: Render the stack environment file (secrets from the vault)
  ansible.builtin.template:
    src: env.j2
    dest: "{{ media_stack_dir }}/.env"
    owner: "{{ media_owner }}"
    group: "{{ media_group }}"
    mode: "0600"
  notify: Recreate VPN containers

- name: Write the CyberGhost OpenVPN client certificate
  ansible.builtin.copy:
    content: "{{ vault_cyberghost_client_cert }}"
    dest: "{{ media_stack_appdata }}/gluetun/client.crt"
    owner: "{{ media_owner }}"
    group: "{{ media_group }}"
    mode: "0600"
  notify: Recreate VPN containers

- name: Write the CyberGhost OpenVPN client key
  ansible.builtin.copy:
    content: "{{ vault_cyberghost_client_key }}"
    dest: "{{ media_stack_appdata }}/gluetun/client.key"
    owner: "{{ media_owner }}"
    group: "{{ media_group }}"
    mode: "0600"
  notify: Recreate VPN containers

- name: Render the docker-compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ media_stack_dir }}/docker-compose.yml"
    owner: "{{ media_owner }}"
    group: "{{ media_group }}"
    mode: "0644"

- name: Deploy the media stack
  community.docker.docker_compose_v2:
    project_src: "{{ media_stack_dir }}"
    state: present
    remove_orphans: true
