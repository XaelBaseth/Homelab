---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install base packages
  ansible.builtin.apt:
    name: "{{ common_packages }}"
    state: present

- name: Ensure locale is generated
  community.general.locale_gen:
    name: "{{ common_locale }}"
    state: present

- name: Set system timezone
  community.general.timezone:
    name: "{{ common_timezone }}"

- name: Create the shared stacks root (single parent for every compose project)
  ansible.builtin.file:
    path: "{{ stacks_root }}"
    state: directory
    owner: "{{ media_owner }}"
    group: "{{ media_group }}"
    mode: "0755"

- name: Harden SSH
  block:
    - name: Deploy SSH hardening drop-in
      ansible.builtin.copy:
        dest: /etc/ssh/sshd_config.d/99-hardening.conf
        owner: root
        group: root
        mode: "0644"
        backup: true
        content: |
          # Managed by Ansible (common role)
          PubkeyAuthentication yes
          PasswordAuthentication no
          PermitRootLogin no
      notify: Restart ssh

    - name: Validate the complete sshd configuration
      ansible.builtin.command: sshd -t
      changed_when: false
  rescue:
    - name: Roll back the hardening drop-in (config failed validation)
      ansible.builtin.file:
        path: /etc/ssh/sshd_config.d/99-hardening.conf
        state: absent
    - name: Abort with a clear message
      ansible.builtin.fail:
        msg: "sshd config was invalid — hardening removed, nothing applied. SSH untouched."
