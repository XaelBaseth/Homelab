---
docker_user: beelink

# APT repo settings
docker_apt_arch: amd64
# Auto-detected release (e.g. "trixie" on Debian 13).
docker_apt_codename: "{{ ansible_facts['distribution_release'] }}"

docker_packages:
  - docker-ce
  - docker-ce-cli
  - containerd.io
  - docker-buildx-plugin
  - docker-compose-plugin

# Keep images/containers/volumes on the 414G /home partition, not the ~12G /var.
docker_data_root: /home/docker

# The containerd snapshotter's content/snapshot store. Its `root` is NOT governed by Docker's
# data-root — left at the default /var/lib/containerd it fills the tiny 12G /var. Pin it to /home.
containerd_data_root: /home/containerd
