---
- name: Ensure apt keyring directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Add Docker's official GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/debian/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"

- name: Add the Docker apt repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ docker_apt_arch }} signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/debian {{ docker_apt_codename }} stable
    filename: docker
    state: present

- name: Install Docker Engine, CLI, containerd and plugins
  ansible.builtin.apt:
    name: "{{ docker_packages }}"
    state: present
    update_cache: true

- name: Ensure the containerd data root exists on /home
  ansible.builtin.file:
    path: "{{ containerd_data_root }}"
    state: directory
    mode: "0711"

- name: Point containerd's store at /home (keeps image layers off the 12G /var)
  # Docker's data-root does NOT relocate the containerd snapshotter store — only this `root` does.
  # On a fresh host this applies before any image is pulled. On an EXISTING host with data already
  # on /var, the store must be COPIED to /home before containerd restarts on the new root, or running
  # containers lose their rootfs — that one-time move is a documented manual step (see Runbook gotchas).
  ansible.builtin.copy:
    dest: /etc/containerd/config.toml
    owner: root
    group: root
    mode: "0644"
    content: |
      # Managed by Ansible (docker role). The Docker containerd; CRI disabled (Docker does not use it).
      disabled_plugins = ["cri"]
      root = "{{ containerd_data_root }}"
  notify:
    - Restart containerd
    - Restart docker

- name: Configure the Docker daemon (data-root + log rotation)
  ansible.builtin.copy:
    dest: /etc/docker/daemon.json
    owner: root
    group: root
    mode: "0644"
    content: |
      {
        "data-root": "{{ docker_data_root }}",
        "log-driver": "json-file",
        "log-opts": {
          "max-size": "10m",
          "max-file": "3"
        }
      }
  notify: Restart docker

- name: Ensure Docker is enabled and started
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started

- name: Add {{ docker_user }} to the docker group
  ansible.builtin.user:
    name: "{{ docker_user }}"
    groups: docker
    append: true
