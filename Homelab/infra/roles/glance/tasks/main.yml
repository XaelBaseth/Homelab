---
- name: Create the Glance stack directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ media_owner }}"
    group: "{{ media_group }}"
    mode: "0755"
  loop:
    - "{{ glance_dir }}"
    - "{{ glance_dir }}/config"

- name: Render the Glance config
  ansible.builtin.template:
    src: glance.yml.j2
    dest: "{{ glance_dir }}/config/glance.yml"
    owner: "{{ media_owner }}"
    group: "{{ media_group }}"
    mode: "0644"

- name: Render the Glance compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ glance_dir }}/docker-compose.yml"
    owner: "{{ media_owner }}"
    group: "{{ media_group }}"
    mode: "0644"

- name: Deploy Glance
  community.docker.docker_compose_v2:
    project_src: "{{ glance_dir }}"
    state: present
