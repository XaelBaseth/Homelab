---
- name: Migrate Seerr appdata from the old jellyseerr path (one-time)
  # Jellyseerr was rebranded to Seerr (Feb 2026). Move the live config/DB to the new
  # path before anything else so Seerr's auto-migration finds the existing data.
  # creates+removes make this run only when the old dir exists and the new one does not.
  ansible.builtin.command:
    cmd: mv {{ media_stack_appdata }}/jellyseerr {{ media_stack_appdata }}/seerr
    creates: "{{ media_stack_appdata }}/seerr"
    removes: "{{ media_stack_appdata }}/jellyseerr"

- name: Create the media-stack directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ media_owner }}"
    group: "{{ media_group }}"
    mode: "0755"
  loop:
    - "{{ media_stack_dir }}"
    - "{{ media_stack_appdata }}"
    - "{{ media_stack_appdata }}/gluetun"
    - "{{ media_stack_appdata }}/qbittorrent"
    - "{{ media_stack_appdata }}/prowlarr"
    - "{{ media_stack_appdata }}/sonarr"
    - "{{ media_stack_appdata }}/radarr"
    - "{{ media_stack_appdata }}/bazarr"
    - "{{ media_stack_appdata }}/recyclarr"
    - "{{ media_stack_appdata }}/jellyfin"
    - "{{ media_stack_appdata }}/seerr"
    - "{{ media_stack_appdata }}/maintainerr"
    - "{{ media_stack_appdata }}/npm"

- name: Render the stack environment file (secrets from the vault)
  ansible.builtin.template:
    src: env.j2
    dest: "{{ media_stack_dir }}/.env"
    owner: "{{ media_owner }}"
    group: "{{ media_group }}"
    mode: "0600"
  notify: Recreate VPN containers

- name: Write the CyberGhost OpenVPN client certificate
  ansible.builtin.copy:
    content: "{{ vault_cyberghost_client_cert }}"
    dest: "{{ media_stack_appdata }}/gluetun/client.crt"
    owner: "{{ media_owner }}"
    group: "{{ media_group }}"
    mode: "0600"
  notify: Recreate VPN containers

- name: Write the CyberGhost OpenVPN client key
  ansible.builtin.copy:
    content: "{{ vault_cyberghost_client_key }}"
    dest: "{{ media_stack_appdata }}/gluetun/client.key"
    owner: "{{ media_owner }}"
    group: "{{ media_group }}"
    mode: "0600"
  notify: Recreate VPN containers

- name: Render the docker-compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ media_stack_dir }}/docker-compose.yml"
    owner: "{{ media_owner }}"
    group: "{{ media_group }}"
    mode: "0644"

- name: Render the Recyclarr config (TRaSH French VOSTFR profiles for Sonarr/Radarr)
  # Recyclarr reads /config/recyclarr.yml on each cron run; API keys come from the
  # container env (SONARR_API_KEY/RADARR_API_KEY in .env, referenced via !env_var).
  ansible.builtin.template:
    src: recyclarr.yml.j2
    dest: "{{ media_stack_appdata }}/recyclarr/recyclarr.yml"
    owner: "{{ media_owner }}"
    group: "{{ media_group }}"
    mode: "0644"

- name: Ensure Seerr config is owned by its non-root container user (UID/GID 1000)
  # Seerr runs strictly as the "node" user (1000). The old fallenbagel/jellyseerr
  # image ran as root, so pre-migration config files are root-owned and unwritable
  # by Seerr. Recursive + idempotent, so it is safe to leave in on every run.
  ansible.builtin.file:
    path: "{{ media_stack_appdata }}/seerr"
    state: directory
    owner: "1000"
    group: "1000"
    recurse: true

- name: Deploy the media stack
  community.docker.docker_compose_v2:
    project_src: "{{ media_stack_dir }}"
    state: present
    remove_orphans: true

- name: Remove stale compose files from the pre-consolidation path (one-time migration)
  # Project name ("media-stack") is unchanged by the move and APPDATA is read from .env
  # (still /home/media-stack/appdata), so the deploy above re-adopts the containers untouched.
  # appdata lives under the old dir, so we clear only the two moved files. Safe to delete after the first apply.
  ansible.builtin.file:
    path: "/home/media-stack/{{ item }}"
    state: absent
  loop:
    - docker-compose.yml
    - .env
