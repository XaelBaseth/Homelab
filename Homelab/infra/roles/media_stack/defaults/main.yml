---
gluetun_image: qmcgaw/gluetun:latest
qbittorrent_image: lscr.io/linuxserver/qbittorrent:latest
prowlarr_image: lscr.io/linuxserver/prowlarr:latest
sonarr_image: lscr.io/linuxserver/sonarr:latest
radarr_image: lscr.io/linuxserver/radarr:latest
bazarr_image: lscr.io/linuxserver/bazarr:latest
recyclarr_image: ghcr.io/recyclarr/recyclarr:latest
lazylibrarian_image: lscr.io/linuxserver/lazylibrarian:latest
jellyfin_image: lscr.io/linuxserver/jellyfin:latest
seerr_image: ghcr.io/seerr-team/seerr:latest  # was fallenbagel/jellyseerr (deprecated Feb 2026)
maintainerr_image: ghcr.io/maintainerr/maintainerr:latest
npm_image: jc21/nginx-proxy-manager:latest

# Recyclarr — syncs TRaSH quality profiles + custom formats into Sonarr/Radarr.
# Cron mode only fires on this schedule (never on container start); the first
# push is a manual `docker exec recyclarr recyclarr sync` — see the Runbook.
recyclarr_cron: "0 3 * * *"   # daily at 03:00 (local TZ)
