---
- name: Create the monitoring stack directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ media_owner }}"
    group: "{{ media_group }}"
    mode: "0755"
  loop:
    - "{{ monitoring_dir }}"
    - "{{ monitoring_appdata }}"
    - "{{ monitoring_appdata }}/uptime-kuma"
    - "{{ monitoring_appdata }}/beszel"
    - "{{ monitoring_appdata }}/beszel-agent"
    - "{{ media_root }}/.beszel"   # empty marker dir so Beszel can report the /data drive's usage

- name: Render the stack environment file (secrets from the vault)
  ansible.builtin.template:
    src: env.j2
    dest: "{{ monitoring_dir }}/.env"
    owner: "{{ media_owner }}"
    group: "{{ media_group }}"
    mode: "0600"

- name: Render the docker-compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ monitoring_dir }}/docker-compose.yml"
    owner: "{{ media_owner }}"
    group: "{{ media_group }}"
    mode: "0644"

- name: Deploy the monitoring stack
  community.docker.docker_compose_v2:
    project_src: "{{ monitoring_dir }}"
    state: present

- name: Remove stale compose files from the pre-consolidation path (one-time migration)
  # The compose project name is the dir basename ("monitoring"), unchanged by the move,
  # so the deploy above re-adopts the running containers. appdata stays at the old path,
  # so we clear only the two files that actually moved. Safe to delete this task after the first apply.
  ansible.builtin.file:
    path: "/home/monitoring/{{ item }}"
    state: absent
  loop:
    - docker-compose.yml
    - .env

- name: Install the healthchecks.io heartbeat cron (external dead-man's-switch)
  ansible.builtin.cron:
    name: healthchecks-heartbeat
    minute: "*/{{ healthchecks_interval_minutes }}"
    job: "curl -fsS -m 10 --retry 3 {{ vault_healthchecks_ping_url }} > /dev/null 2>&1"
    user: root
  when: vault_healthchecks_ping_url is defined and vault_healthchecks_ping_url | length > 0

# ── Daily status digest (Uptime Kuma up/down + Beszel host metrics) → Discord ──
# Both tasks are gated on all four secrets being present, so a converge before you've
# added them to the vault simply skips the feature instead of erroring.
- name: Configure the daily status-report digest
  when:
    - vault_status_report_webhook is defined and vault_status_report_webhook | length > 0
    - vault_uptime_kuma_api_key is defined and vault_uptime_kuma_api_key | length > 0
    - vault_beszel_user is defined and vault_beszel_user | length > 0
    - vault_beszel_password is defined and vault_beszel_password | length > 0
  block:
    - name: Render the status-report script (root-owned — embeds secrets)
      ansible.builtin.template:
        src: status-report.py.j2
        dest: "{{ monitoring_dir }}/status-report.py"
        owner: root
        group: root
        mode: "0700"

    - name: Install the daily status-report cron
      ansible.builtin.cron:
        name: status-report-daily
        hour: "{{ status_report_hour }}"
        minute: "{{ status_report_minute }}"
        job: "python3 {{ monitoring_dir }}/status-report.py >> /var/log/status-report.log 2>&1"
        user: root
