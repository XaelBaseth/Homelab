---
# ── Monitoring stack images (on :latest, like the rest — pin later) ──
uptime_kuma_image: louislam/uptime-kuma:latest
beszel_hub_image: henrygd/beszel:latest
beszel_agent_image: henrygd/beszel-agent:latest

# Host paths
monitoring_dir: "{{ stacks_root }}/monitoring"  # compose + .env live here
monitoring_appdata: /home/monitoring/appdata    # per-service data bind mounts (kept in place — live data, not moved)

# Published ports
uptime_kuma_port: 3001
beszel_hub_port: 8090
beszel_agent_port: 45876

# healthchecks.io dead-man's-switch cadence (Beelink pings out every N minutes)
healthchecks_interval_minutes: 5

# ── Daily status digest → dedicated Discord webhook ──
# A stdlib Python script (status-report.py) runs once a day: reads up/down per monitor from
# Uptime Kuma's /metrics and per-host CPU/MEM/DISK from Beszel, then posts one Discord embed.
# Green "all nominal" if everything is up and under the warn thresholds; red otherwise.
status_report_hour: 8            # 24h local time (host timezone)
status_report_minute: 0
status_report_disk_warn_pct: 90  # a host disk at/above this flips the report to "attention needed"
status_report_load_warn_pct: 90  # same for sustained CPU or memory %
